<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>厚木市PTA資料ページ編集 D&D版 v2</title><link rel="stylesheet" href="/tools/atsugi-editor-v2.css"></head><body><header><div class="head"><h1>厚木市 学校別ページ編集 D&D版 v2</h1><div><button onclick="copyHtml()">学校HTMLコピー</button> <button class="sub" onclick="saveHtml()">HTML保存</button> <button class="gold" onclick="saveJson()">JSON保存</button></div></div></header><main><aside><input id="q" placeholder="学校名検索" oninput="renderList()"><select id="f" onchange="renderList()" style="margin-top:8px"><option>全て</option><option>小学校</option><option>中学校</option><option>要確認</option><option>問題あり</option><option>重大リスク</option><option>評価準備中</option><option>適正化モデル</option></select><div class="smallrow"><button class="sub" onclick="addSchool()">学校追加</button><button class="danger" onclick="resetAll()">初期化</button></div><p class="hint">画像はドラッグ＆ドロップでも、公開パスの直接入力でも使えます。</p><div id="list"></div></aside><section><div id="note" class="notice"></div><div class="card"><h2 id="title"></h2><div class="grid"><div class="field"><label>学校名</label><input id="schoolName" oninput="setv('schoolName',this.value)"></div><div class="field"><label>slug</label><input id="id" oninput="setv('id',slugify(this.value))"></div><div class="field"><label>学校区分</label><select id="schoolType" onchange="setv('schoolType',this.value)"><option>小学校</option><option>中学校</option><option>その他</option></select></div><div class="field"><label>評価状況</label><select id="evaluationLabel" onchange="setv('evaluationLabel',this.value)"><option>評価準備中</option><option>要確認</option><option>問題あり</option><option>重大リスク</option><option>適正化モデル</option></select></div><div class="field"><label>確認資料</label><input id="documentName" oninput="setv('documentName',this.value)"></div><div class="field"><label>入会申込書</label><select id="applicationStatus" onchange="setv('applicationStatus',this.value)"><option>あり</option><option>開示資料上確認できない</option><option>未確認</option><option>不存在回答</option><option>形式のみ</option></select></div><div class="field full"><label>資料画像：ドラッグ＆ドロップ、または画像パスを直接入力</label><div class="drops"><div class="imagebox"><div class="drop" data-i="0">画像1<br>ドロップ</div><label class="pathlabel">画像1パス</label><input class="pathinput" data-path-i="0" placeholder="/assets/archive/atsugi/atsugi-es/01.png"></div><div class="imagebox"><div class="drop" data-i="1">画像2<br>ドロップ</div><label class="pathlabel">画像2パス</label><input class="pathinput" data-path-i="1" placeholder="/assets/archive/atsugi/atsugi-es/02.png"></div><div class="imagebox"><div class="drop" data-i="2">画像3<br>ドロップ</div><label class="pathlabel">画像3パス</label><input class="pathinput" data-path-i="2" placeholder="/assets/archive/atsugi/atsugi-es/03.png"></div></div><p class="hint">公開用パスで出力する場合は、ここに入れた画像パスが優先されます。未入力なら自動パスを使います。</p></div><div class="field full modebox"><label>画像出力方式</label><select id="imageMode" onchange="setv('imageMode',this.value)"><option value="embed">HTMLに画像を埋め込む</option><option value="path">画像パスで出力する</option></select><div class="copyline">自動画像パス：/assets/archive/atsugi/<span id="pathSlug">atsugi-es</span>/01.png など</div></div><div class="field full"><label>確認できる事実（一行一項目）</label><textarea id="facts" oninput="setLines('facts',this.value)"></textarea></div><div class="field full"><label>資料上確認できない点（一行一項目）</label><textarea id="unknowns" oninput="setLines('unknowns',this.value)"></textarea></div><div class="field full"><label>疑義フラグ（一行一項目）</label><textarea id="flags" oninput="setLines('flags',this.value)"></textarea></div><div class="field full"><label>当委員会の評価</label><textarea id="evaluationText" oninput="setv('evaluationText',this.value)" style="min-height:150px"></textarea></div></div></div><div class="pv"><div class="card"><h3>プレビュー</h3><iframe id="prev"></iframe></div><div class="card"><h3>生成HTML</h3><pre id="code"></pre></div></div></section></main><script src="/tools/atsugi-editor-v2.js"></script></body></html>
